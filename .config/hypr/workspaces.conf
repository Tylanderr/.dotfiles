# Primary monitor
workspace = 1, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1

# Secondary monitor
workspace = 2, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 9, monitor:DP-2

windowrule = opacity 1.0 1.0, match:class ^(chrome-www.youtube.com__feed_subscriptions-Default)$
windowrule = opacity 1.0 1.0, match:title ^(S.T.A.L.K.E.R.: Anomaly)$
windowrule = opacity 1.0 1.0, match:title ^(zen)$

windowrule {
  name = youtube
  workspace = 1
  match:class = ^(chrome-www.youtube.com__feed_subscriptions-Default)$
}

windowrule {
  name = ghostty
  workspace = 1
  match:class = ^(com.mitchellh.ghostty)$
}

windowrule {
  name = steam
  workspace = 1
  maximize = 1
  match:class = ^(steam)$
}

windowrule {
  name = btop
  workspace = 2
  maximize = 1
  match:class = ^(org.omarchy.btop)$
}

windowrule {
  name = zen
  workspace = 2
  match:class = ^(zen)$
}

windowrule {
  name = thunderbird
  workspace = 3
  match:class = ^(org.mozilla.Thunderbird)$
}

windowrule {
  name = discord
  workspace = 4
  match:class = ^(chrome-discord.com__channels_@me-Default)$
}

windowrule {
  name = youtubeMusic
  workspace = 5
  match:class = ^(chrome-music.youtube.com__-Default)$
}

windowrule {
  name = stalkerGamma
  fullscreen = 1
  match:title = ^(S.T.A.L.K.E.R.: Anomaly)$
}
