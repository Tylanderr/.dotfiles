set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g mouse on
set -sg escape-time 1
set -g base-index 1
set -g pane-base-index 1
set -g status-position top
set -g window-status-separator ""

set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi
set-option -g renumber-windows on

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key C-s set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

bind q killp

vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind h if-shell "$is_vim" 'send-keys C-Space h' 'select-pane -L'
bind j if-shell "$is_vim" 'send-keys C-Space j' 'select-pane -D'
bind k if-shell "$is_vim" 'send-keys C-Space k' 'select-pane -U'
bind l if-shell "$is_vim" 'send-keys C-Space l' 'select-pane -R'

bind s new-window \; rename-window 'ssh'
bind n new-window -c '#{pane_current_path}' \; rename-window 'cli'
bind o split-window -h -c '#{pane_current_path}' "opencode"
bind-key -r i run-shell "tmux neww -n notes ~/scripts/tmux-notes.sh"

bind - split-window -v -c '#{pane_current_path}'
bind \\ split-window -h -c '#{pane_current_path}'
bind Left swap-window -t -1 \; select-window -t -1
bind Right swap-window -t +1 \; select-window -t +1

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @powerkit_theme 'tokyo-night'
set -g @powerkit_theme_variant 'night'
set -g @powerkit_plugins 'datetime'
set -g @powerkit_keybinding_conflict_action skip

run '~/.tmux/plugins/tpm/tpm'
